id = "pyxis"
name = "Pyxis"
description = "Language support for the Pyxis DSL: syntax highlighting and language server."
version = "0.1.0"
schema_version = 1
author = "Pyxis Contributors"

[language_servers.pyxis]
name = "Pyxis Language Server"
languages = ["Pyxis"]

[grammars.pyxis]
repository = "https://github.com/ferrobrew/tree-sitter-pyxis"
# Must be a full commit SHA, not a branch name: Zed keys its compiled-grammar
# cache on this string, so a branch ref is never re-resolved once cached. Bump
# it (after pushing the grammar) via `python tooling/sync-grammar.py`.
commit = "e8dd772209cef6432f0cbcf6c59806d8b71a361d"
