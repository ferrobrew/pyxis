on:
  push:
  workflow_dispatch:
name: CI

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # tooling/tree-sitter-pyxis grammar
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - run: rustup component add clippy
      # Nightly rustfmt for the unstable imports_granularity option (rustfmt.toml).
      - run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # test.py lints the viewer (tsc/eslint/prettier) but does not install;
      # provide the workspace deps here.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Run tests, clippy, fmt, and viewer lint
        run: python test.py

  validate-pyxis-defs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyxis
        uses: actions/checkout@v4
        with:
          path: pyxis
          submodules: recursive # tooling/tree-sitter-pyxis grammar

      - name: Checkout pyxis-defs
        uses: actions/checkout@v4
        with:
          repository: ferrobrew/pyxis-defs
          path: pyxis-defs

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run pyxis-defs build
        working-directory: pyxis-defs
        run: python build.py --path ../pyxis/driver

      - name: Check for unexpected changes
        working-directory: pyxis-defs
        run: |
          # Check if any files other than docs/index.json have changed
          CHANGED_FILES=$(git diff --name-only)
          if [ -n "$CHANGED_FILES" ]; then
            # Filter out docs/index.json
            OTHER_CHANGES=$(echo "$CHANGED_FILES" | grep -v '^docs/index\.json$' || true)
            if [ -n "$OTHER_CHANGES" ]; then
              echo "::warning::The following files changed unexpectedly after build:"
              echo "$OTHER_CHANGES"
              echo ""
              echo "This may indicate that pyxis-defs needs to be rebuilt and committed."
            fi
          fi

  # Build the viewer, and on main — once the Rust tests and pyxis-defs
  # validation have passed — upload it as a Pages artifact. `needs` keeps
  # this after everything else is green; the artifact upload is gated on
  # being on main.
  viewer:
    name: Build viewer
    needs: [test, validate-pyxis-defs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Build viewer
        working-directory: viewer
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  # Deploy the uploaded artifact to this repository's GitHub Pages site
  # (served at https://ferrobrew.github.io/pyxis/). Requires the repo's
  # Pages source to be set to "GitHub Actions".
  deploy-viewer:
    name: Deploy viewer
    needs: viewer
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
