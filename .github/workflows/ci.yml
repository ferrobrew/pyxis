on:
  push:
  workflow_dispatch:
name: CI

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # tooling/tree-sitter-pyxis grammar
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - run: rustup component add clippy
      # Nightly rustfmt for the unstable imports_granularity option (rustfmt.toml).
      - run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # test.py lints the viewer (tsc/eslint/prettier) but does not install;
      # provide the workspace deps here.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Run tests, clippy, fmt, and viewer lint
        run: python test.py

  validate-pyxis-defs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyxis
        uses: actions/checkout@v4
        with:
          path: pyxis
          submodules: recursive # tooling/tree-sitter-pyxis grammar

      - name: Checkout pyxis-defs
        uses: actions/checkout@v4
        with:
          repository: ferrobrew/pyxis-defs
          path: pyxis-defs

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run pyxis-defs build
        working-directory: pyxis-defs
        run: python build.py --path ../pyxis/driver

      - name: Check for unexpected changes
        working-directory: pyxis-defs
        run: |
          # Check if any files other than docs/index.json have changed
          CHANGED_FILES=$(git diff --name-only)
          if [ -n "$CHANGED_FILES" ]; then
            # Filter out docs/index.json
            OTHER_CHANGES=$(echo "$CHANGED_FILES" | grep -v '^docs/index\.json$' || true)
            if [ -n "$OTHER_CHANGES" ]; then
              echo "::warning::The following files changed unexpectedly after build:"
              echo "$OTHER_CHANGES"
              echo ""
              echo "This may indicate that pyxis-defs needs to be rebuilt and committed."
            fi
          fi

  # Build the viewer, and on main — once the Rust tests and pyxis-defs
  # validation have passed — deploy it. `needs` keeps the deploy after
  # everything else is green; the deploy steps are gated on the build above
  # succeeding (later steps don't run once one fails) and on being on main.
  viewer:
    name: Build & deploy viewer
    needs: [test, validate-pyxis-defs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Build viewer
        working-directory: viewer
        run: npm run build

      - name: Checkout GitHub Pages repository
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: ferrobrew/ferrobrew.github.io
          path: pages
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        working-directory: pages
        run: |
          # Create target directory if it doesn't exist
          mkdir -p pyxis

          # Remove old files
          rm -rf pyxis/*

          # Copy new build
          cp -r ../viewer/dist/* pyxis/

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push
          git add pyxis
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy pyxis viewer

            Automated deployment from ferrobrew/pyxis@${{ github.sha }}"
            git push
          fi

      - name: Deployment complete
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✓ Viewer deployed successfully!"
          echo "🌐 Available at: https://ferrobrew.github.io/pyxis/"
